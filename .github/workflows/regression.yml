name: 🤖 AI Regression Pipeline

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [test-repo-push]   # triggered when peripheral_testing pushes to main
  schedule:
    - cron: '0 0 * * *'       # daily at midnight UTC
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - test_ethernet.py
          - test_gpio.py
          - test_i2c.py
          - test_leds.py
          - test_pcie_hardware.py
          - test_pcie_software.py
          - test_rtc.py
          - test_spi.py
          - test_timer.py
          - test_uart.py
          - test_watchdog.py
      enable_self_healing:
        description: 'Enable AI Self-Healing'
        required: true
        default: true
        type: boolean
      create_jira_tickets:
        description: 'Create Jira tickets (healed + unhealed + env)'
        required: true
        default: true
        type: boolean
      max_healing_iterations:
        description: 'Max iterations (1-5)'
        required: false
        default: '3'
        type: string


jobs:
  regression:
    name: 🧪 Regression + AI Analysis
    runs-on: self-hosted
    timeout-minutes: 60
    env:
      REGRESSION_RUN_ID: ${{ github.run_id }}
      REGRESSION_RUN_STAMP: ${{ github.run_id }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ── Checkout App Repo ───────────────────────────────────────────────────
      - name: 📥 Checkout App Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 20


      # ── Python Setup ────────────────────────────────────────────────────────
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 📦 Install Dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f "agent_requirements.txt" ]; then pip install -r agent_requirements.txt; fi
          pip install pytest-json-report

      # ── Execute Tests ───────────────────────────────────────────────────────
      - name: 🧪 Execute Regression Tests
        id: run_tests
        continue-on-error: true
        env:
          PYTHONPATH: .
        run: |
          source .venv/bin/activate
          # Clean all __pycache__ and .pyc files before execution
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true
          mkdir -p reports
          
          TEST_ROOT="tests"

          # Resolve test path based on selected scope
          case "${{ inputs.test_scope || 'all' }}" in
            all)                        TEST_PATH="${TEST_ROOT}/" ;;
            test_ethernet.py)           TEST_PATH="${TEST_ROOT}/test_ethernet.py" ;;
            test_gpio.py)               TEST_PATH="${TEST_ROOT}/test_gpio.py" ;;
            test_i2c.py)                TEST_PATH="${TEST_ROOT}/test_i2c.py" ;;
            test_leds.py)               TEST_PATH="${TEST_ROOT}/test_leds.py" ;;
            test_pcie_hardware.py)      TEST_PATH="${TEST_ROOT}/test_pcie_hardware.py" ;;
            test_pcie_software.py)      TEST_PATH="${TEST_ROOT}/test_pcie_software.py" ;;
            test_rtc.py)                TEST_PATH="${TEST_ROOT}/test_rtc.py" ;;
            test_spi.py)                TEST_PATH="${TEST_ROOT}/test_spi.py" ;;
            test_timer.py)              TEST_PATH="${TEST_ROOT}/test_timer.py" ;;
            test_uart.py)               TEST_PATH="${TEST_ROOT}/test_uart.py" ;;
            test_watchdog.py)           TEST_PATH="${TEST_ROOT}/test_watchdog.py" ;;
            *)                          TEST_PATH="${TEST_ROOT}/" ;;
          esac

          echo "Test Path: $TEST_PATH"
          pytest "$TEST_PATH" -v --tb=short --json-report --json-report-file=reports/test_results.json 2>&1 | tee reports/raw_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # ── Upload Artifacts ────────────────────────────────────────────────────
      - name: 📊 Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports-${{ github.run_id }}
          path: |
            reports/
            logs/
            bsp_rca_report_*.md
            .report*.json
